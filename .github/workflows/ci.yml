name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  build:
    name: build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      ISSUER: ${{ secrets.ISSUER }}
      RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
      RSA_PUBLIC_KEY: ${{ secrets.RSA_PUBLIC_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required build secrets
        run: |
          required=(
            "NEXT_PUBLIC_CONVEX_URL"
            "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            "CLERK_SECRET_KEY"
            "ISSUER"
            "RSA_PRIVATE_KEY"
            "RSA_PUBLIC_KEY"
          )
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done

      - name: Run build
        run: npm run build

      - name: Run OIDC smoke checks
        env:
          SMOKE_START_SERVER: "false"
        run: |
          set -euo pipefail

          cleanup() {
            if [ -f /tmp/next-dev.pid ]; then
              kill "$(cat /tmp/next-dev.pid)" 2>/dev/null || true
              rm -f /tmp/next-dev.pid
            fi
          }
          trap cleanup EXIT

          npm run dev > /tmp/next-dev.log 2>&1 &
          echo $! > /tmp/next-dev.pid

          ready="false"
          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:3000/.well-known/openid-configuration >/dev/null; then
              ready="true"
              break
            fi
            sleep 2
          done

          if [ "$ready" != "true" ]; then
            echo "Next.js server failed to become ready for smoke checks."
            cat /tmp/next-dev.log || true
            exit 1
          fi

          make smoke-oidc
